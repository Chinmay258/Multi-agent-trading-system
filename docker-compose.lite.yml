# =============================================================================
# "Lite" overlay — for a tiny (~1 GB RAM) free VM, e.g. GCP e2-micro Always-Free.
# =============================================================================
# Use ON TOP of the prod overlay:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.lite.yml up -d
#
# It tightens memory caps and shrinks Redis so the stack fits a 1 GB box. This is
# best-effort: a 1 GB VM is genuinely tight for 10 containers — expect slower
# warmups and the occasional restart under load. A >= 2 GB VM (or the Oracle
# Always-Free ARM box) is recommended; there you don't need this overlay at all.
# =============================================================================

services:
  redis:
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    deploy:
      resources:
        limits:
          memory: 160M

  postgres:
    deploy:
      resources:
        limits:
          memory: 256M

  technical_analysis_agent:
    deploy:
      resources:
        limits:
          memory: 320M

  market_data_agent:
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    deploy:
      resources:
        limits:
          memory: 256M

  decision_agent:
    deploy:
      resources:
        limits:
          memory: 192M
  risk_agent:
    deploy:
      resources:
        limits:
          memory: 192M
  execution_agent:
    deploy:
      resources:
        limits:
          memory: 192M
  monitoring_agent:
    deploy:
      resources:
        limits:
          memory: 192M
