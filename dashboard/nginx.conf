# nginx serves the built SPA and proxies API + websocket to the FastAPI service.
# Same-origin in production, so the frontend needs no CORS and no API base URL.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA routing: serve index.html for any non-file path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → FastAPI control plane.
    location ~ ^/(api|positions|health|control) {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 30s;
    }

    # WebSocket stream → FastAPI (requires HTTP/1.1 + Upgrade).
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
