# Pre-commit hooks — run automatically on `git commit` after `pre-commit install`.
# Install:  pip install pre-commit && pre-commit install
# Run on all files manually:  pre-commit run --all-files
#
# Two things matter most here:
#   1. ruff keeps the code formatted + linted (same config as CI, see pyproject.toml).
#   2. gitleaks blocks secrets from ever being committed.

repos:
  # ---- Ruff: lint + format (pinned to match pyproject.toml / CI) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---- gitleaks: secret scanner ----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---- General hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=1024]
